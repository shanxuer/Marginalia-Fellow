name: Vault Integrity

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Template self-test
        run: python3 scripts/check_new_note_templates.py --self-test
      - name: Full audit
        run: python3 scripts/audit_vault_integrity_2026_05_23.py --skip-git-policy
